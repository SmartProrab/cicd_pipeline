name: Deploy application
description: Deploy application with docker image on VPS
author: NikitaLyubimtsev

inputs:
  image_with_tag:
    description: Full image name (e.g. ghcr.io/org/app:{tag})
    required: true
  app_name:
    description: Name of app
    required: true
  host:
    description: url of hosts to deploy
    required: true
  username:
    description: hosts username
    required: true
  key:
    description: hosts ssl key
    required: true
  path:
    description: Path to VPS on docker compose with this app without '~/'
    required: false
    default: ""
  app_type:
    description: Type application (spring, vue)
    required: false
    default: 'spring'
  health_timeout:
    description: Seconds to wait for healthy container
    required: false
    default: "60"
  app_image_url:
    description: URL current docker image
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ inputs.host }}
        username: ${{ inputs.username }}
        key: ${{ inputs.key }}
        script: |
          set -euo pipefail

          #------------------------------------
          # Environment Variables
          #------------------------------------
          # Обязательные
          APP="${{ inputs.app_name }}"
          IMAGE="${{ inputs.image_with_tag }}"

          # Опциональные с дефолтами
          APP_TYPE="${{ inputs.app_type }}"
          TIMEOUT="${{ inputs.health_timeout }}"
          PATH_TO_APP="${{ inputs.path }}"
          APP_IMAGE_URL="${{ inputs.app_image_url }}"
          
          #------------------------------------
          # Validate requires
          #------------------------------------
          if [[ -z "$APP" || -z "$IMAGE" ]]; then
            echo "Required environments: APP, IMAGE"
            exit 1
          fi

          #------------------------------------
          # Helps
          #------------------------------------
          log() {
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] $*"
          }

          rollback() {
            if [[ -n "$OLD_IMAGE" ]]; then
                log "Rolling back to previous image: $OLD_IMAGE"
                docker compose --profile "$APP" up -d --no-deps "$APP"
            fi
            exit 1
          }
          
          #------------------------------------
          # Change directory if specified
          #------------------------------------
          if [[ -n "$PATH_TO_APP" ]]; then
              cd ~/"$PATH_TO_APP" || { log "Cannot cd to $PATH_TO_APP"; exit 1; }
          fi

          if [[ ! -f docker-compose.yml ]]; then
              log "docker-compose.yml not found in $(pwd)"
              exit 1
          fi
          
          #------------------------------------
          # Setup APP_IMAGE_URL variable
          #------------------------------------
          if [[ -n "$APP_IMAGE_URL" ]]; then
            IMAGE_VAR="$APP_IMAGE_URL"
          else
            IMAGE_VAR=$(echo "$APP" | tr '[:lower:]-' '[:upper:]_')_IMAGE
          fi

          log "Using APP_IMAGE: $IMAGE_VAR"
          export "$IMAGE_VAR"="$IMAGE"
          
          #------------------------------------
          # Detect current container/image
          #------------------------------------
          log "Detect current container..."
          OLD_CONTAINER=$(docker compose --profile "$APP" ps -q "$APP" || true)

          OLD_IMAGE=""
          if [[ -n "$OLD_CONTAINER" ]]; then
              OLD_IMAGE=$(docker inspect --format='{{.Config.Image}}' "$OLD_CONTAINER")
          fi

          log "Current image: ${OLD_IMAGE:-none}"

          #------------------------------------
          # Pull new image
          #------------------------------------
          log "Pull new image: $IMAGE"
          docker compose --profile "$APP" pull "$APP"

          #------------------------------------
          # Start new container
          #------------------------------------
          log "Starting update container..."
          docker compose --profile "$APP" up -d --no-deps "$APP"
          
          #------------------------------------
          # Healthcheck
          #------------------------------------
          log "Waiting for container health (timeout ${TIMEOUT}s)..."
          START_TIME=$(date +%s)

          while true; do
            CONTAINER_ID=$(docker compose --profile "$APP" ps -q "$APP")

            if [[ "$APP_TYPE" == "spring" ]]; then
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$CONTAINER_ID" 2>/dev/null || echo "no-healthcheck")
              [[ "$STATUS" == "healthy" || "$STATUS" == "no-healthcheck" ]] && break
            elif [[ "$APP_TYPE" == "vue" ]]; then
              HTTP_CODE=$(docker exec "$CONTAINER_ID" curl -s -o /dev/null -w "%{http_code}" http://localhost:80/ || echo 0)
              [[ "$HTTP_CODE" == "200" ]] && break
            else
              echo "Unknown APP_TYPE: $APP_TYPE"
              rollback
            fi

            NOW=$(date +%s)
            ELAPSED=$((NOW - START_TIME))
            if [[ $ELAPSED -ge $TIMEOUT ]]; then
              log "Healthcheck timeout reached"
              rollback
            fi

            sleep 3
          done
          
          #------------------------------------
          # Cleanup
          #------------------------------------
          log "Cleaning ol images for $APP (keep current: $IMAGE)..."

          REPO=$(echo "$IMAGE" | cut -d: -f1)
          CURRENT_ID=$(docker image inspect "$IMAGE" --format '{{.Id}}')
          
          # Получаем только образы репозитория
          ALL_IDS=$(docker images "$REPO" --format '{{.ID}}')
          
          IMAGES_TO_REMOVE=""
          
          for ID in $ALL_IDS; do
            if [[ "$ID" != "$CURRENT_ID" ]]; then
              IN_USE=$(docker ps -a --filter "ancestor=$ID" -q)
              if [[ -z "$IN_USE" ]]; then
              IMAGES_TO_REMOVE="$IMAGES_TO_REMOVE $ID"
              fi
            fi
          done
          
          if [[ -n "$IMAGES_TO_REMOVE" ]]; then
            log "Removing images:$IMAGES_TO_REMOVE"
            docker rmi $IMAGES_TO_REMOVE || true
          else
            log "No removable images found"
          fi

          log "Deploy finished successfully!"